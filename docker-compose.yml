# Локальный dev по умолчанию: только инфраструктура.
# Полный контейнерный backend запускается явно:
#   docker compose --profile app up -d --build
# Сеть: внутри Docker используйте сервисные имена db, qdrant, redis — не localhost.

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-backend-env: &backend-env
  DATABASE_URL: postgresql://user:password@db:5432/app_db
  QDRANT_HOST: qdrant
  QDRANT_PORT: "6333"
  REDIS_URL: redis://redis:6379/0
  # JWT и прочее; для продакшена задайте SECRET_KEY в .env или окружении хоста
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
  UPLOAD_DIR: /app/vault/uploads
  PARSED_MARKDOWN_DIR: /app/vault/artifacts/markdown

x-backend-volumes: &backend-volumes
  - uploads_data:/app/vault/uploads
  - parsed_markdown_data:/app/vault/artifacts/markdown

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    profiles: ["app"]
    build: *backend-build
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    extra_hosts:
      # LM Studio на хосте: задайте LLM_PROVIDER=lmstudio и LMSTUDIO_API_BASE=http://host.docker.internal:1234/v1
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        set -e
        uv run alembic upgrade head
        exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  celery-worker-high:
    profiles: ["app"]
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command:
      - uv
      - run
      - celery
      - -A
      - app.worker
      - worker
      - -Q
      - document-high-priority
      - --loglevel=info

  celery-worker-bulk:
    profiles: ["app"]
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command:
      - uv
      - run
      - celery
      - -A
      - app.worker
      - worker
      - -Q
      - document-bulk
      - --loglevel=info

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
  parsed_markdown_data:
